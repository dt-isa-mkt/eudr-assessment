const MAX_SCORE = SECTIONS.reduce((t, s) => t + s.questions.length * 3, 0); // 87
const TOTAL_Q = SECTIONS.reduce((a, s) => a + s.questions.length, 0);

// ── READINESS ─────────────────────────────────────────────────────────────────
const READINESS = [
  { val: 0, label: "Non avviato",        color: "#e5e7eb", desc: "Nessuna azione pianificata in questa direzione" },
  { val: 1, label: "Parzialmente avviato", color: C.amber,  desc: "In corso o in fase di pianificazione" },
  { val: 3, label: "Strutturato e completo", color: C.green, desc: "Processo formalizzato e operativo" },
];

// ── LEVEL ─────────────────────────────────────────────────────────────────────
const getLevel = (pct) => {
  if (pct >= 70) return { label: "Basso Rischio",    color: C.green,  icon: "✅", tagline: "Il livello di preparazione EUDR è buono. Consolidare le aree ancora parziali." };
  if (pct >= 40) return { label: "Rischio Moderato", color: C.amber,  icon: "🔶", tagline: "Sono presenti aree di rischio rilevanti. Necessario un piano strutturato di adeguamento." };
  return              { label: "Rischio Elevato",   color: C.red,    icon: "⚠️",  tagline: "Gap di preparazione significativo. Richiesta azione strutturata su tutte le aree critiche." };
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function sectionScore(sec, answers) {
  const max = sec.questions.length * 3;
  const score = sec.questions.reduce((t, q) => t + (answers[q.id] ?? 0), 0);
  return { score, max, pct: Math.round((score / max) * 100) };
}
function criticalGaps(answers) {
  return SECTIONS.flatMap(s =>
    s.questions.filter(q => q.risk && (answers[q.id] ?? 0) === 0)
      .map(q => ({ ...q, section: s }))
  );
}

// ── EMAILJS SEND ──────────────────────────────────────────────────────────────
const sendResultsEmail = (formData, sectionScores, gaps, totalScore, pct, level) => {
  if (!window.emailjs) return;
  window.emailjs.init(EMAILJS_KEY);
  const secSummary = sectionScores.map(s => `${s.title}: ${s.score}/${s.max} (${s.pct}%)`).join("\n");
  const gapsText = gaps.length ? gaps.map((g, i) => `${i+1}. [${g.section.title}] ${g.text} (${g.ref})`).join("\n") : "Nessun gap critico rilevato.";
  const message = `EUDR ASSESSMENT — ISA Digital Consulting\n\nLEAD\nNome: ${formData.name}\nAzienda: ${formData.company}\nRuolo: ${formData.role}\nEmail: ${formData.email}\nTelefono: ${formData.phone}\nData: ${new Date().toLocaleDateString("it-IT")}\n\nRISULTATI\nPunteggio: ${totalScore}/${MAX_SCORE} (${pct}%)\nLivello: ${level.label}\n\nSEZIONI\n${secSummary}\n\nGAP CRITICI\n${gapsText}`;
  window.emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
    to_name: "ISA Digital Consulting",
    from_name: `${formData.name} — ${formData.company}`,
    reply_to: formData.email,
    message,
  }).catch(() => {});
};

    doc.setTextColor(78,167,46); doc.setFontSize(12); doc.setFont("helvetica","bold");
    doc.text("Nessun gap critico rilevato.", W/2, 80, { align: "center" });
  } else {
    gaps.forEach((g, i) => {
      if (y > 260) { doc.addPage(); y = 20; }
      doc.setFillColor(255,245,247); doc.setDrawColor(234,0,72);
      doc.roundedRect(12,y,W-24,22,2,2,"FD");
      doc.setTextColor(234,0,72); doc.setFontSize(7.5); doc.setFont("helvetica","bold");
      doc.text(`${i+1}. [${g.section.title}]  ${g.ref}`, 17, y+7);
      doc.setTextColor(50,60,75); doc.setFont("helvetica","normal"); doc.setFontSize(7.5);
      const lines = doc.splitTextToSize(g.text, W-36);
      doc.text(lines[0], 17, y+14);
      if (lines[1]) doc.text(lines[1], 17, y+19);
      y += 27;
    });
  }

  // Page 4: roadmap
  doc.addPage();
  doc.setFillColor(245,248,250); doc.rect(0,0,W,297,"F");
  doc.setFillColor(0,94,124); doc.rect(0,0,W,18,"F");
  doc.setTextColor(255,255,255); doc.setFontSize(13); doc.setFont("helvetica","bold");
  doc.text("ROADMAP E SCADENZE EUDR", 15, 12);
  const roadmap = [
    { date: "29 giu 2023", label: "Entrata in vigore Reg. UE 2023/1115", color: [98,188,208] },
    { date: "31 dic 2020", label: "Data limite deforestazione zero (cutoff)", color: [234,0,72] },
    { date: "30 dic 2024", label: "Istituzione sistema informativo Commissione (Art. 33)", color: [0,127,163] },
    { date: "30 giu 2025", label: "Pubblicazione elenco paesi rischio (Art. 29(2))", color: [0,127,163] },
    { date: "30 apr 2026", label: "Riesame semplificazione da parte della Commissione (Art. 34(1bis))", color: [70,77,98] },
    { date: "30 dic 2026", label: ">> Applicazione obblighi grandi operatori (Art. 38(2))", color: [234,0,72] },
    { date: "30 giu 2027", label: ">> Applicazione obblighi PMI (Art. 38(3))", color: [234,0,72] },
    { date: "1 dic 2029",  label: "Interfaccia elettronica doganale operativa (Art. 28(1))", color: [0,127,163] },
    { date: "30 giu 2030", label: "Primo riesame generale del Regolamento (Art. 34(2))", color: [70,77,98] },
  ];
  y = 28;
  roadmap.forEach(item => {
    doc.setFillColor(...item.color); doc.roundedRect(12,y,40,10,2,2,"F");
    doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont("helvetica","bold");
    doc.text(item.date, 32, y+6.5, { align: "center" });
    doc.setTextColor(30,40,55); doc.setFont("helvetica","normal"); doc.setFontSize(8.5);
    doc.text(item.label, 58, y+6.5);
    y += 16;
  });
  doc.setFillColor(11,48,65); doc.rect(0,280,W,17,"F");
  doc.setTextColor(98,188,208); doc.setFontSize(8); doc.setFont("helvetica","bold");
  doc.text("ISA Digital Consulting  |  ESG Business Unit", W/2, 288, { align: "center" });
  doc.setFont("helvetica","normal"); doc.setTextColor(150,190,210);
  doc.text("Questo report è generato in conformità al Reg. UE 2023/1115 versione consolidata dicembre 2025", W/2, 294, { align: "center" });

  doc.save(`EUDR_Assessment_${formData.company.replace(/\s+/g,"_")}_${today.replace(/\//g,"-")}.pdf`);
};

// ── MAIN ──────────────────────────────────────────────────────────────────────
function EUDRAssessment() {
  const [step, setStep] = useState("welcome");
  const [formData, setFormData] = useState({ name: "", company: "", role: "", email: "", phone: "" });
  const [answers, setAnswers] = useState({});
  const [formErr, setFormErr] = useState({});
  const [isMobile, setIsMobile] = useState(typeof window !== "undefined" ? window.innerWidth <= 768 : false);
  const topRef = useRef(null);
  const emailReadyRef = useRef(null);

  const answeredCount = Object.keys(answers).length;

  const validateForm = () => {
    const e = {};
    if (!formData.name.trim()) e.name = true;
    if (!formData.company.trim()) e.company = true;
    if (!formData.role.trim()) e.role = true;
    if (!formData.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email = true;
    if (!formData.phone.trim()) e.phone = true;
    setFormErr(e);
    return Object.keys(e).length === 0;
  };

  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth <= 768);
    onResize();
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  useEffect(() => {
    const load = () => {
      if (window.emailjs) { if (emailReadyRef.current) { emailReadyRef.current(); emailReadyRef.current = null; } return; }
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";
      s.async = true;
      s.onload = () => { if (emailReadyRef.current) { emailReadyRef.current(); emailReadyRef.current = null; } };
      document.head.appendChild(s);
    };
    load();
  }, []);

  const goToResults = () => {
    const filled = { ...answers };
    SECTIONS.forEach(s => s.questions.forEach(q => { if (filled[q.id] === undefined) filled[q.id] = 0; }));
    setAnswers(filled);
    setStep("results");
    setTimeout(() => topRef.current?.scrollIntoView({ behavior: "smooth" }), 50);
    const totalScore = Object.values(filled).reduce((a, v) => a + v, 0);
    const pct = Math.round((totalScore / MAX_SCORE) * 100);
    const level = getLevel(pct);
    const sectionScores = SECTIONS.map(s => ({ ...s, ...sectionScore(s, filled) }));
    const gaps = criticalGaps(filled);
    const doSend = () => sendResultsEmail(formData, sectionScores, gaps, totalScore, pct, level);
    if (window.emailjs) doSend();
    else emailReadyRef.current = doSend;
  };

  const canSubmit = answeredCount >= Math.ceil(TOTAL_Q * 0.6);

  const inpStyle = (err) => ({
    width: "100%", border: `1.5px solid ${err ? C.red : "#D1DCE5"}`, borderRadius: 8,
    padding: "10px 14px", fontSize: 14, outline: "none", boxSizing: "border-box", fontFamily: "inherit",

  return (
    <div ref={topRef} style={{ minHeight: "100vh", background: "#F2F6F9", fontFamily: "'Segoe UI', system-ui, sans-serif" }}>
      {/* NAV */}
      
      <div style={{ maxWidth: 900, margin: "0 auto", padding: isMobile ? "24px 12px" : "40px 20px" }}>

        {/* WELCOME */}
        {step === "welcome" && (
          <div style={{ maxWidth: 700, margin: "0 auto", textAlign: "center" }}>
            <div style={{ display: "inline-block", background: `${C.teal3}15`, border: `1px solid ${C.teal3}30`, borderRadius: 12, padding: isMobile ? "8px 14px" : "8px 20px", fontSize: isMobile ? 11 : 12, color: C.teal3, fontWeight: 600, marginBottom: 24, textTransform: "uppercase", letterSpacing: 1.2, lineHeight: 1.35, maxWidth: "100%" }}>
              Regolamento (UE) 2023/1115 — Versione consolidata dicembre 2025
            </div>
            <h1 style={{ fontSize: isMobile ? 28 : 38, fontWeight: 900, color: C.navy, margin: "0 0 16px", lineHeight: isMobile ? 1.15 : 1.2 }}>
              Quanto è pronta la tua azienda<br/>
              <span style={{ color: C.teal3 }}>alla conformità EUDR?</span>
            </h1>
            <p style={{ fontSize: isMobile ? 15 : 16, color: "#555", lineHeight: 1.7, marginBottom: 32 }}>
              L'EUDR (EU Deforestation Regulation) vieta l'immissione sul mercato UE di prodotti legati a deforestazione e degrado forestale dopo il <strong>31 dicembre 2020</strong>. Il tool valuta il livello di preparazione della tua azienda su <strong>7 materie prime</strong> e le principali obbligazioni del Regolamento.
            </p>
            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr 1fr" : "repeat(3,1fr)", gap: 12, marginBottom: 36 }}>
              {[{ n: "6", label: "Sezioni tematiche" }, { n: "29", label: "Domande di assessment" }, { n: "~12'", label: "Tempo stimato" }].map(i => (
                <div key={i.n} style={{ background: "#fff", borderRadius: 12, padding: isMobile ? "14px 10px" : "16px 12px", border: "1px solid #e5e7eb" }}>
                  <div style={{ fontSize: 26, fontWeight: 800, color: C.teal3 }}>{i.n}</div>
                  <div style={{ fontSize: 12, color: C.slate, marginTop: 4 }}>{i.label}</div>

              ))}

              <p style={{ margin: 0, fontSize: 13, color: C.navy, fontWeight: 600, marginBottom: 10 }}>📋 Il tool copre:</p>

          <div style={{ maxWidth: 620, margin: "0 auto" }}>
            <div style={{ background: "#fff", borderRadius: 16, padding: isMobile ? 20 : 36, boxShadow: "0 2px 16px rgba(11,48,65,0.10)" }}>
              <h2 style={{ color: C.navy, fontSize: 22, fontWeight: 800, margin: "0 0 6px" }}>Chi sei?</h2>
              <p style={{ color: C.slate, fontSize: 13, margin: "0 0 24px" }}>Inserisci i tuoi dati per accedere all'assessment e ricevere il report.</p>
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 16, marginBottom: 16 }}>
                {[{ k: "name", l: "Nome e Cognome *", p: "Mario Rossi" }, { k: "company", l: "Azienda *", p: "Nome azienda" }].map(({ k, l, p }) => (
                  <div key={k}>
                    <label style={{ fontSize: 12, fontWeight: 600, color: C.slate, display: "block", marginBottom: 4 }}>{l}</label>
                    <input style={inpStyle(formErr[k])} value={formData[k]} placeholder={p} onChange={e => setFormData({ ...formData, [k]: e.target.value })} />
                    {formErr[k] && <span style={{ color: C.red, fontSize: 11 }}>Campo obbligatorio</span>}
                  </div>
                ))}
              </div>
              <div style={{ marginBottom: 16 }}>
                <label style={{ fontSize: 12, fontWeight: 600, color: C.slate, display: "block", marginBottom: 4 }}>Ruolo / Funzione *</label>
                <select style={{ ...inpStyle(formErr.role), background: "#fff" }} value={formData.role} onChange={e => setFormData({ ...formData, role: e.target.value })}>
                  <option value="">— Seleziona —</option>
                  {["CEO / Direzione Generale","Responsabile Acquisti / Supply Chain","Responsabile Legale / Compliance","Responsabile Qualità / Sostenibilità","Responsabile ESG / CSR","Consulente Esterno","Altro"].map(r => <option key={r} value={r}>{r}</option>)}
                </select>
                {formErr.role && <span style={{ color: C.red, fontSize: 11 }}>Campo obbligatorio</span>}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 16, marginBottom: 28 }}>
                {[{ k: "email", l: "Email *", p: "mario@azienda.it", t: "email" }, { k: "phone", l: "Cellulare *", p: "+39 333 000 0000", t: "tel" }].map(({ k, l, p, t }) => (
                  <div key={k}>
                    <label style={{ fontSize: 12, fontWeight: 600, color: C.slate, display: "block", marginBottom: 4 }}>{l}</label>
                    <input type={t} style={inpStyle(formErr[k])} value={formData[k]} placeholder={p} onChange={e => setFormData({ ...formData, [k]: e.target.value })} />
                    {formErr[k] && <span style={{ color: C.red, fontSize: 11 }}>Valore non valido</span>}
                  </div>
                ))}
              </div>
              <div style={{ display: "flex", gap: 12 }}>
                <button style={{ flex: 1, background: "#E8EEF3", color: C.slate, border: "none", borderRadius: 8, padding: "11px 20px", fontWeight: 700, fontSize: 14, cursor: "pointer" }} onClick={() => setStep("welcome")}>← Indietro</button>
                <button style={{ flex: 2, background: C.teal3, color: "#fff", border: "none", borderRadius: 8, padding: "11px 20px", fontWeight: 700, fontSize: 14, cursor: "pointer" }} onClick={() => { if (validateForm()) setStep("assessment"); }}>Avvia Assessment →</button>
              </div>
            </div>
          </div>
        )}

        {/* ASSESSMENT */}
        {step === "assessment" && (
          <div>
            <div style={{ background: C.navy, padding: "10px 0 12px", margin: isMobile ? "0 -12px 24px" : "0 -20px 28px", paddingLeft: isMobile ? 12 : 20, paddingRight: isMobile ? 12 : 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6, fontSize: 11, color: "#8AABBE" }}>
                <span>Completamento</span>
                <span>{answeredCount} / {TOTAL_Q} domande</span>
              </div>
              <ProgressBar answered={answeredCount} total={TOTAL_Q} />
            </div>
            {SECTIONS.map(s => (
              <SectionCard key={s.id} section={s} answers={answers} isMobile={isMobile}
                onChange={(id, val) => setAnswers(prev => ({ ...prev, [id]: val }))} />
            ))}
            <div style={{ textAlign: "center", marginTop: 8 }}>
              <button
                onClick={goToResults}
                style={{ background: canSubmit ? C.green : "#B0C0CC", color: canSubmit ? "#fff" : "#8A9BB0", border: "none", borderRadius: 12, padding: isMobile ? "14px 18px" : "14px 40px", fontSize: isMobile ? 14 : 16, fontWeight: 800, cursor: canSubmit ? "pointer" : "not-allowed", width: isMobile ? "100%" : "auto" }}
              >
                {canSubmit ? "✓ Visualizza Risultati" : `Completa almeno il 60% delle domande (${answeredCount}/${TOTAL_Q})`}
              </button>
            </div>
          </div>
        )}

        {/* RESULTS */}
        {step === "results" && <ResultsView answers={answers} formData={formData} isMobile={isMobile} />}

      </div>

      {/* FOOTER */}
      
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(EUDRAssessment));

  </script>
</body>
</html>
